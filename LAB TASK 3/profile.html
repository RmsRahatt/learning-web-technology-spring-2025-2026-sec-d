<!doctype html>
<html lang="en">
  <head>
    <title>Profile Picture Form</title>
    <script src="profile.js"></script>
  </head>
  <body>
    <form name="myForm">
      <fieldset>
        <legend>Profile Picture</legend>
        User Id <input type="text" name="userid" value="" /> Picture
        <input type="file" name="pic" />
        <hr />
        <input
          type="submit"
          name="submit"
          value="Submit"
          onclick="return validatePic();"
        />
      </fieldset>
    </form>
  </body>
</html>
