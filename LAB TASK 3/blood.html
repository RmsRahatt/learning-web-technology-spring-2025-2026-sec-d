<!doctype html>
<html lang="en">
  <head>
    <title>Blood Group Form</title>
    <script src="blood.js"></script>
  </head>
  <body>
    <form name="myForm">
      Blood Group
      <select name="bg">
        <option value="">Select</option>
        <option value="A+">A+</option>
        <option value="B+">B+</option>
        <option value="O+">O+</option>
      </select>
      <input
        type="submit"
        name="submit"
        value="Submit"
        onclick="return validateBlood();"
      />
    </form>
  </body>
</html>
