<!doctype html>
<html lang="en">
  <head>
    <title>Degree Form</title>
    <script src="degree.js"></script>
  </head>
  <body>
    <form name="myForm">
      <fieldset>
        <legend>Degree</legend>
        <input type="checkbox" name="ssc" value="SSC" /> SSC
        <input type="checkbox" name="hsc" value="HSC" /> HSC
        <input type="checkbox" name="bsc" value="BSc" /> BSc
        <input
          type="submit"
          name="submit"
          value="Submit"
          onclick="return validateDegree();"
        />
      </fieldset>
    </form>
  </body>
</html>
