<html>
  <head>
    <title>Product Management</title>
    <link href="style.css" />
  </head>
  <body>
    <h1>Product Management Page</h1>

    <p>Product: Smart Watch</p>
    <p>Unit Price: 1000</p>

    <p>
      <label>Quantity: </label>
      <input type="number" id="qty" value="0" min="0" />
    </p>

    <p>
      <label>Total Price: </label>
      <input type="text" id="total" value="0" readonly />
    </p>

    <script src="script.js"></script>
  </body>
</html>
