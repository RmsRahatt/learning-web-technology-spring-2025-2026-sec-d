<html lang="en">
  <head>
    <title>Tic-Tac-Toe</title>
    <style>
      table {
        border-collapse: collapse;
        margin-top: 20px;
      }
      td {
        width: 60px;
        height: 60px;
        text-align: center;
      }
      button {
        width: 100%;
        height: 100%;
        font-size: 24px;
        background-color: rgb(240, 240, 240);
        cursor: pointer;
      }
      #resetBtn {
        margin-top: 15px;
        padding: 10px;
        background-color: rgb(0, 170, 255);
        color: white;
        border: none;
        cursor: pointer;
      }
      p {
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Tic-Tac-Toe Game</h1>

    <p id="status">1ST PLAYER</p>

    <table border="1">
      <tr>
        <td><button id="b1"></button></td>
        <td><button id="b2"></button></td>
        <td><button id="b3"></button></td>
      </tr>
      <tr>
        <td><button id="b4"></button></td>
        <td><button id="b5"></button></td>
        <td><button id="b6"></button></td>
      </tr>
      <tr>
        <td><button id="b7"></button></td>
        <td><button id="b8"></button></td>
        <td><button id="b9"></button></td>
      </tr>
    </table>

    <button id="resetBtn">Reset Game</button>

    <script src="script.js"></script>
  </body>
</html>
