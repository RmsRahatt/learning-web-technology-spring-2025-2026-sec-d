<!doctype html>
<html lang="en">
  <head>
    <title>DOB Form</title>
    <script src="dob.js"></script>
  </head>
  <body>
    <form name="myForm">
      <fieldset>
        <legend>Date of Birth</legend>
        dd / mm / yyyy
        <input type="text" name="day" size="2" />
        <input type="text" name="month" size="2" />
        <input type="text" name="year" size="4" />
        <input
          type="submit"
          name="submit"
          value="Submit"
          onclick="return validateDOB();"
        />
      </fieldset>
    </form>
  </body>
</html>
